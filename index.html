<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* =========================================================
     TOKENS — paleta e tipografia do manual SoHo Business v1.0
     ========================================================= */
  :root {
    --ink:       #0A0A0A;
    --ink-soft:  #111111;
    --neutral:   #8E8E8E;
    --neutral-2: #C9CBCA;
    --paper:     #F5F7F6;
    --line:      rgba(10,10,10,0.12);
    --line-dk:   rgba(245,247,246,0.15);

    --f-display: 'Space Grotesk', -apple-system, system-ui, sans-serif;
    --f-body:    'Space Grotesk', -apple-system, system-ui, sans-serif;
    --f-mono:    'Space Grotesk', -apple-system, system-ui, sans-serif;

    --max: 1440px;
    --gutter: clamp(24px, 4vw, 64px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--f-body);
    font-weight: 400;
    background: var(--paper);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11";
    overflow-x: hidden;
  }

  img { display: block; max-width: 100%; }

  ::selection { background: var(--ink); color: var(--paper); }

  /* Wordmark display type — uppercase, tight, heavy */
  .display {
    font-family: var(--f-display);
    font-weight: 700;
    letter-spacing: -0.035em;
    line-height: 0.92;
    text-wrap: balance;
  }

  /* Small utility label, mono, tracked */
  .eyebrow {
    font-family: var(--f-mono);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .rule { height: 1px; background: currentColor; opacity: 0.15; width: 100%; }

  /* =========================================================
     APP SHELL
     ========================================================= */
  #root { position: relative; }

  /* Scroll reveal */
  .reveal {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.9s cubic-bezier(.2,.7,.2,1), transform 0.9s cubic-bezier(.2,.7,.2,1);
  }
  .reveal.in { opacity: 1; transform: translateY(0); }

  /* button */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 18px 28px;
    font-family: var(--f-mono);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-decoration: none;
    border: 1px solid var(--ink);
    background: var(--ink);
    color: var(--paper);
    cursor: pointer;
    transition: background 0.3s, color 0.3s, transform 0.3s;
  }
  .btn:hover { background: transparent; color: var(--ink); }
  .btn.ghost { background: transparent; color: var(--ink); }
  .btn.ghost:hover { background: var(--ink); color: var(--paper); }
  .btn.on-dark { border-color: var(--paper); background: var(--paper); color: var(--ink); }
  .btn.on-dark:hover { background: transparent; color: var(--paper); }
  .btn .arrow { transition: transform 0.35s cubic-bezier(.2,.7,.2,1); }
  .btn:hover .arrow { transform: translateX(6px); }
</style>
