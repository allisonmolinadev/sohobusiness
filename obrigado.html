<style>
  :root {
    --ink:       #0A0A0A;
    --neutral:   #8E8E8E;
    --neutral-2: #C9CBCA;
    --paper:     #F5F7F6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Space Grotesk', -apple-system, system-ui, sans-serif;
    background: var(--ink);
    color: var(--paper);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: clamp(24px, 6vw, 72px);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      linear-gradient(rgba(10,10,10,0.82), rgba(10,10,10,0.93)),
      url('assets/fachada-principal.jpg') center/cover no-repeat;
  }
  main {
    position: relative; z-index: 1;
    max-width: 580px; width: 100%;
    text-align: center;
    display: flex; flex-direction: column; align-items: center;
    animation: rise 0.9s cubic-bezier(.2,.7,.2,1);
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo {
    width: min(210px, 56vw); height: auto;
    display: block; margin-bottom: 48px;
  }
  .eyebrow {
    font-size: 11px; font-weight: 400;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--neutral-2); margin-bottom: 26px;
  }
  h1 {
    font-size: clamp(40px, 6vw, 76px);
    font-weight: 400; letter-spacing: -0.035em;
    line-height: 1.0; margin-bottom: 28px;
  }
  h1 em {
    font-style: italic; font-weight: 300; color: var(--neutral-2);
  }
  p {
    font-size: 17px; line-height: 1.65; font-weight: 300;
    color: var(--neutral-2); max-width: 460px; margin-bottom: 44px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 14px;
    padding: 18px 30px;
    font-size: 12px; font-weight: 400;
    letter-spacing: 0.16em; text-transform: uppercase;
    text-decoration: none;
    border: 1px solid var(--paper);
    background: var(--paper); color: var(--ink);
    transition: background 0.3s, color 0.3s;
  }
  .btn:hover { background: transparent; color: var(--paper); }
  .btn .arrow { transition: transform 0.35s cubic-bezier(.2,.7,.2,1); }
  .btn:hover .arrow { transform: translateX(6px); }
</style>
</head>
<body>
  <div class="bg"></div>
  <main>
    <img class="logo" src="assets/soho-logo-white.png" alt="SoHo Business">
    <div class="eyebrow">— Cadastro recebido</div>
    <h1>Obrigado pelo<br><em>seu interesse.</em></h1>
    <p>Recebemos os seus dados. Em breve nossa equipe entrará em contato e você receberá o material completo do SoHo Business no e-mail informado.</p>
    <a class="btn" href="index.html">Voltar ao site <span class="arrow">→</span></a>
  </main>
</body>
